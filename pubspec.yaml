name: qr_generator_scanner
description: "QR Generator & Scanner app by TheGreat."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  mobile_scanner: 7.0.0
  qr_flutter: ^4.1.0
  shared_preferences: ^2.3.2
  uuid: ^4.5.1
  provider: ^6.1.2
  url_launcher: ^6.3.1
  permission_handler: 12.0.1
  connectivity_plus: 7.1.0
  share_plus: 12.0.2
  path_provider: ^2.1.5
  device_info_plus: 12.4.0
  gal: ^2.3.2
  geolocator: ^13.0.2
  google_mobile_ads: ^5.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/logo.png"
  image_path_android: "assets/logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/logo.png"

flutter_native_splash:
  color: "#F2F2F7"
  color_dark: "#000000"
  android: true
  ios: true
  android_12:
    color: "#F2F2F7"
    color_dark: "#000000"

flutter:
  uses-material-design: true

  assets:
    - assets/logo.png
