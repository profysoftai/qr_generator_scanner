version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  mobile_scanner: ^6.0.0
  qr_flutter: ^4.1.0
  shared_preferences: ^2.3.2
